<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WORD UP! 中1英単語トレーニング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F4FB;--panel:#FFFFFF;--primary:#3D2FB8;--primary-light:#6B5CE7;
    --accent:#FF8A3D;--success:#18C29C;--danger:#FF5A6E;
    --text:#1A1A2E;--sub:#7A7A94;--border:#E9E9F4;
    --shadow:0 8px 28px rgba(61,47,184,.10);--shadow-sm:0 4px 14px rgba(61,47,184,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Noto Sans JP',system-ui,sans-serif;color:var(--text);
    background:linear-gradient(160deg,#EEEcFB 0%,#F4F4FB 40%,#F0F6FB 100%);
    min-height:100dvh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;min-height:100dvh;background:var(--bg);
    display:flex;flex-direction:column;position:relative;box-shadow:0 0 50px rgba(61,47,184,.06);}
  .topbar{padding:18px 20px 14px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 70%,rgba(244,244,251,0));}
  .brand{display:flex;flex-direction:column;line-height:1.05}
  .brand .logo{font-family:'Poppins';font-weight:800;font-size:24px;letter-spacing:-.5px;color:var(--primary)}
  .brand .logo span{color:var(--accent)}
  .brand .sub{font-size:11px;color:var(--sub);font-weight:500;margin-top:2px}
  .grp-pill{background:var(--panel);border:1px solid var(--border);border-radius:999px;
    padding:7px 14px;font-size:12px;font-weight:700;color:var(--primary);box-shadow:var(--shadow-sm);
    max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .screen{flex:1;overflow-y:auto;padding:6px 20px 40px;-webkit-overflow-scrolling:touch}
  .hide{display:none!important}
  .ring-card{background:var(--panel);border-radius:24px;padding:24px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:20px;margin-bottom:18px;}
  .ring{position:relative;width:104px;height:104px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:'Poppins';font-size:26px;font-weight:800;color:var(--primary);line-height:1}
  .ring .pct small{font-size:10px;color:var(--sub);font-weight:600;margin-top:2px}
  .ring-info h2{font-size:15px;font-weight:900;margin-bottom:8px}
  .ring-info .stat{display:flex;gap:14px}
  .ring-info .stat div{font-size:11px;color:var(--sub);font-weight:600}
  .ring-info .stat b{display:block;font-family:'Poppins';font-size:20px;color:var(--text);font-weight:700}
  .section-label{font-size:12px;font-weight:800;color:var(--sub);margin:6px 2px 10px;letter-spacing:.3px}
  .grp-scroll{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
  .grp-scroll::-webkit-scrollbar{display:none}
  .grp-chip{flex:0 0 auto;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;
    padding:10px 15px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:.15s;white-space:nowrap;}
  .grp-chip small{display:block;font-size:10px;color:var(--sub);font-weight:600;margin-top:1px}
  .grp-chip.on{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}
  .grp-chip.on small{color:rgba(255,255,255,.8)}
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
  .mode{background:var(--panel);border-radius:20px;padding:20px 16px;cursor:pointer;
    box-shadow:var(--shadow-sm);border:1.5px solid transparent;transition:.15s;display:flex;flex-direction:column;gap:8px;}
  .mode:active{transform:scale(.97)}
  .mode .ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
  .mode h3{font-size:15px;font-weight:900}
  .mode p{font-size:11px;color:var(--sub);font-weight:500;line-height:1.4}
  .mode.flash .ic{background:#EAE7FB}
  .mode.quiz .ic{background:#FFE9DB}
  .mode.game .ic{background:#DEF7F0}
  .mode.spell .ic{background:#E3F0FF}
  .manage-btn{display:flex;align-items:center;gap:12px;background:var(--panel);border:1.5px solid var(--border);
    border-radius:18px;padding:16px 18px;margin-top:12px;cursor:pointer;box-shadow:var(--shadow-sm);transition:.15s}
  .manage-btn:active{transform:scale(.98)}
  .manage-btn .ic{width:40px;height:40px;border-radius:12px;background:#FDE4E8;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto}
  .manage-btn h3{font-size:14px;font-weight:900}
  .manage-btn p{font-size:11px;color:var(--sub);font-weight:500}
  .btn{border:none;border-radius:14px;font-family:inherit;font-weight:800;font-size:15px;padding:15px;cursor:pointer;transition:.15s;width:100%;}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-ghost{background:var(--panel);color:var(--primary);border:1.5px solid var(--border)}
  .btn-accent{background:var(--accent);color:#fff}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--sub);
    font-weight:700;font-size:14px;cursor:pointer;padding:6px 2px;margin-bottom:8px;font-family:inherit;}
  .mode-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .mode-head h2{font-size:18px;font-weight:900}
  .progress-line{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:18px}
  .progress-line i{display:block;height:100%;background:var(--primary);border-radius:999px;transition:width .3s}
  .flash-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
  .card{width:100%;aspect-ratio:3/2;background:var(--panel);border-radius:24px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;
    position:relative;padding:20px;text-align:center;transition:.2s;}
  .card:active{transform:scale(.98)}
  .card .tag{position:absolute;top:14px;left:16px;font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.5px}
  .card .tap-hint{position:absolute;bottom:14px;font-size:11px;color:var(--sub);font-weight:600}
  .card .en{font-family:'Poppins';font-size:40px;font-weight:700;color:var(--primary);word-break:break-word}
  .card .ja{font-size:28px;font-weight:700;color:var(--text)}
  .card.learned-mark::after{content:'✓ おぼえた';position:absolute;top:13px;right:14px;font-size:10px;font-weight:800;color:var(--success)}
  .flash-nav{display:flex;gap:10px;width:100%}
  .flash-nav .btn{flex:1}
  .flash-mark{display:flex;gap:10px;width:100%}
  .counter{font-family:'Poppins';font-weight:700;color:var(--sub);font-size:14px}
  .toggle-row{display:flex;gap:8px;align-items:center;justify-content:center;width:100%}
  .seg{display:inline-flex;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:3px;gap:2px}
  .seg button{border:none;background:none;font-family:inherit;font-weight:700;font-size:12px;color:var(--sub);padding:7px 12px;border-radius:9px;cursor:pointer}
  .seg button.on{background:var(--primary);color:#fff}
  .q-card{background:var(--panel);border-radius:22px;padding:30px 20px;box-shadow:var(--shadow);text-align:center;margin-bottom:16px}
  .q-card .qlabel{font-size:11px;font-weight:800;color:var(--sub);letter-spacing:.5px;margin-bottom:12px}
  .q-card .qword{font-family:'Poppins';font-size:36px;font-weight:700;color:var(--primary);word-break:break-word}
  .q-card .qword.ja{font-family:'Noto Sans JP';color:var(--text);font-size:28px}
  .choices{display:grid;gap:10px}
  .choice{background:var(--panel);border:1.5px solid var(--border);border-radius:15px;padding:16px;
    font-family:inherit;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;transition:.12s;}
  .choice:active{transform:scale(.99)}
  .choice.correct{background:var(--success);border-color:var(--success);color:#fff}
  .choice.wrong{background:var(--danger);border-color:var(--danger);color:#fff}
  .choice.dim{opacity:.45}
  .quiz-score{font-family:'Poppins';font-weight:700;color:var(--sub);font-size:14px}
  .result{text-align:center;padding:30px 10px}
  .result .big{font-family:'Poppins';font-size:60px;font-weight:800;color:var(--primary);line-height:1}
  .result .emoji{font-size:54px;margin-bottom:6px}
  .result h2{font-size:20px;font-weight:900;margin:10px 0 4px}
  .result p{color:var(--sub);font-weight:600;font-size:13px;margin-bottom:20px}
  .miss-list{text-align:left;background:var(--panel);border-radius:16px;padding:6px 4px;box-shadow:var(--shadow-sm);margin-bottom:18px;max-height:220px;overflow-y:auto}
  .miss-list .row{display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
  .miss-list .row:last-child{border:none}
  .miss-list .row b{font-family:'Poppins';color:var(--primary);font-weight:700}
  .miss-list .row span{color:var(--sub);font-weight:600}
  .game-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-family:'Poppins';font-weight:700}
  .game-top .timer{font-size:22px;color:var(--primary)}
  .game-top .left{font-size:13px;color:var(--sub)}
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tile{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:16px 8px;min-height:62px;
    display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;font-weight:700;font-size:15px;transition:.12s;line-height:1.2;}
  .tile.en{font-family:'Poppins';color:var(--primary)}
  .tile:active{transform:scale(.96)}
  .tile.sel{border-color:var(--accent);background:#FFF4EC}
  .tile.done{opacity:0;pointer-events:none;transform:scale(.8)}
  .tile.miss{border-color:var(--danger);background:#FFE9EC;animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .add-box{background:var(--panel);border-radius:18px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:16px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;font-weight:800;color:var(--sub);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;
    font-family:inherit;font-size:14px;color:var(--text);background:#FCFCFE;}
  .field textarea{resize:vertical;min-height:90px;line-height:1.5}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary-light)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tabs{display:flex;gap:6px;background:var(--panel);border:1.5px solid var(--border);border-radius:13px;padding:4px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:none;font-family:inherit;font-weight:800;font-size:13px;color:var(--sub);padding:9px;border-radius:9px;cursor:pointer}
  .tabs button.on{background:var(--primary);color:#fff}
  .word-list{display:flex;flex-direction:column;gap:8px}
  .word-row{background:var(--panel);border-radius:13px;padding:12px 14px;box-shadow:var(--shadow-sm);
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .word-row .w-en{font-family:'Poppins';font-weight:700;color:var(--primary);font-size:15px}
  .word-row .w-ja{font-size:13px;color:var(--text);font-weight:600}
  .word-row .w-grp{font-size:10px;color:var(--sub);font-weight:700;margin-top:2px}
  .word-row .ops{display:flex;gap:6px;flex:0 0 auto}
  .iconbtn{border:none;background:#F2F2FA;border-radius:9px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--sub)}
  .iconbtn.del:active{background:var(--danger);color:#fff}
  .empty{text-align:center;color:var(--sub);font-weight:600;font-size:13px;padding:40px 20px;line-height:1.6}
  .help{font-size:11px;color:var(--sub);line-height:1.6;margin-top:6px}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;
    padding:12px 22px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pop{position:fixed;inset:0;pointer-events:none;z-index:40;display:flex;align-items:center;justify-content:center}
  .pop span{position:absolute;font-size:24px;animation:fly .8s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<div class="app">
  <div class="topbar">

</div>
<div class="toast" id="toast"></div>

function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
    localStorage.setItem(STORE_KEY,JSON.stringify(SEED));
    return JSON.parse(JSON.stringify(SEED));
  }catch(e){ if(!mem) mem=JSON.parse(JSON.stringify(SEED)); return mem; }
}
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){ mem=state; } }

function wordsOf(g){ return g==='all'?state.words:state.words.filter(x=>x.groupId===g); }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function groupName(g){ if(g==='all')return'ぜんぶ'; const o=state.groups.find(x=>x.id===g); return o?o.name:'?'; }
function norm(s){ return s.toLowerCase().replace(/\s+/g,' ').trim(); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }
function updatePill(){ $('grpPill').textContent=groupName(currentGroup); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pop(){
  const p=document.createElement('div');p.className='pop';const ems=['⭐','✨','🎉','💫'];
  for(let i=0;i<8;i++){const s=document.createElement('span');s.textContent=ems[i%ems.length];
    s.style.setProperty('--dx',(Math.random()*200-100)+'px');s.style.setProperty('--dy',(-Math.random()*160-40)+'px');p.appendChild(s);}
  document.body.appendChild(p);setTimeout(()=>p.remove(),800);
}

let qz={list:[],i:0,score:0,miss:[],dir:'en',answered:false};
function startQuiz(){ const list=wordsOf(currentGroup); if(list.length<4){toast('クイズは4語以上で遊べるよ');return;} qz={list:shuffle(list).slice(0,Math.min(10,list.length)),i:0,score:0,miss:[],dir:'en',answered:false}; renderQuiz(); }
function renderQuiz(){
  if(qz.i>=qz.list.length) return renderQuizResult();
  const c=qz.list[qz.i],askEn=qz.dir==='en';
  const question=askEn?c.en:c.ja;
  const pool=state.words.filter(x=>x.id!==c.id);
  const opts=shuffle([c,...shuffle(pool).slice(0,3)]);
  const ct=x=>askEn?x.ja:x.en;
  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="mode-head"><h2>✏️ クイズ</h2><span class="quiz-score">⭐ ${qz.score}</span></div>
    <div class="progress-line"><i style="width:${qz.i/qz.list.length*100}%"></i></div>
    <div class="q-card"><div class="qlabel">${askEn?'この単語の意味は？':'これを英語で言うと？'}</div>
      <div class="qword ${askEn?'':'ja'}">${esc(question)}</div></div>
    <div class="choices">
      ${opts.map(x=>`<button class="choice" data-id="${x.id}" onclick="answerQuiz('${x.id}','${c.id}')">${esc(ct(x))}</button>`).join('')}
    </div>`;
}
function answerQuiz(picked,correctId){
  if(qz.answered)return; qz.answered=true;
  const c=qz.list[qz.i],real=state.words.find(x=>x.id===c.id),ok=picked===correctId;
  document.querySelectorAll('.choice').forEach(b=>{
    const id=b.dataset.id;
    if(id===correctId)b.classList.add('correct');
    else if(id===picked)b.classList.add('wrong'); else b.classList.add('dim');
    b.onclick=null;
  });
  if(ok){qz.score++;if(real)real.correct++;pop();} else {qz.miss.push(c);if(real)real.wrong++;}
  save();
  setTimeout(()=>{qz.i++;qz.answered=false;renderQuiz();},ok?700:1300);
}
function renderQuizResult(){
  const total=qz.list.length,rate=Math.round(qz.score/total*100);
  let emoji='💪',msg='その調子！';

  else if(rate>=50){emoji='👍';msg='いい感じ、あと少し！';}

/* マッチング */
let gm={pairs:[],sel:null,done:0,t:0,timer:null,need:0};
function startGame(){
  const list=wordsOf(currentGroup); if(list.length<3){toast('マッチングは3語以上で遊べるよ');return;}
  const pick=shuffle(list).slice(0,Math.min(6,list.length));
  gm={pairs:pick,sel:null,done:0,t:0,timer:null,need:pick.length};
  renderGame();
  clearInterval(gm.timer);
  gm.timer=setInterval(()=>{gm.t++;const el=$('gmTimer');if(el)el.textContent=fmt(gm.t);else clearInterval(gm.timer);},1000);
}
function fmt(s){const m=Math.floor(s/60),x=s%60;return (m>0?m+':':'')+(m>0?String(x).padStart(2,'0'):x)+(m>0?'':'秒');}
function renderGame(){
  const ens=gm.pairs.map(p=>({id:p.id,text:p.en,type:'en'}));
  const jas=gm.pairs.map(p=>({id:p.id,text:p.ja,type:'ja'}));
  const tiles=shuffle(ens.concat(jas));
  screen.innerHTML=`
    <button class="back" onclick="stopGame()">‹ もどる</button>
    <div class="mode-head"><h2>⚡ マッチング</h2></div>
    <div class="game-top"><span class="left">のこり ${gm.need-gm.done} ペア</span><span class="timer" id="gmTimer">${fmt(gm.t)}</span></div>
    <div class="match-grid" id="grid">
      ${tiles.map(t=>`<div class="tile ${t.type}" data-id="${t.id}" data-type="${t.type}" onclick="tapTile(this)">${esc(t.text)}</div>`).join('')}
    </div>`;
}
function tapTile(el){
  if(el.classList.contains('done')||el.classList.contains('sel'))return;
  if(!gm.sel){gm.sel=el;el.classList.add('sel');return;}
  const a=gm.sel,b=el;
  if(a.dataset.type===b.dataset.type){a.classList.remove('sel');gm.sel=b;b.classList.add('sel');return;}
  if(a.dataset.id===b.dataset.id){
    a.classList.add('done');b.classList.add('done');gm.sel=null;gm.done++;pop();
    const left=document.querySelector('.left');if(left)left.textContent=`のこり ${gm.need-gm.done} ペア`;
    if(gm.done>=gm.need)finishGame();
  }else{
    b.classList.add('miss');a.classList.add('miss');const a2=a,b2=b;gm.sel=null;
    setTimeout(()=>{a2.classList.remove('miss','sel');b2.classList.remove('miss');},350);
  }
}
function stopGame(){ clearInterval(gm.timer); renderHome(); }
function finishGame(){
  clearInterval(gm.timer);
  setTimeout(()=>{ screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="result"><div class="emoji">⚡</div><div class="big">${fmt(gm.t)}</div><h2>クリア！</h2><p>${gm.need}ペア そろえたよ</p></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-ghost" onclick="renderHome()">ホーム</button>
      <button class="btn btn-primary" onclick="startGame()">もう一回</button></div>`; },400);
}

  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="mode-head"><h2>➕ 単語をふやす</h2></div>
    <div class="tabs">
      <button class="${mngTab==='list'?'on':''}" onclick="mngSwitch('list')">一覧</button>
      <button class="${mngTab==='add'?'on':''}" onclick="mngSwitch('add')">1語ずつ</button>
      <button class="${mngTab==='bulk'?'on':''}" onclick="mngSwitch('bulk')">まとめて</button>
      <button class="${mngTab==='grp'?'on':''}" onclick="mngSwitch('grp')">グループ</button>
    </div>
    <div id="mngBody"></div>`;
  renderMngBody();
}
function mngSwitch(t){ mngTab=t; renderManage(); }
function grpOptions(sel){ return state.groups.map(g=>`<option value="${g.id}" ${g.id===sel?'selected':''}>${esc(g.name)}</option>`).join(''); }
function renderMngBody(){
  const body=$('mngBody');
  if(mngTab==='add'){
    body.innerHTML=`
      <div class="add-box">
        <div class="row2">
          <div class="field"><label>英語</label><input id="addEn" placeholder="apple" autocapitalize="off"></div>
          <div class="field"><label>日本語</label><input id="addJa" placeholder="りんご"></div>
        </div>
        <div class="field"><label>グループ</label><select id="addGrp">${grpOptions(currentGroup!=='all'?currentGroup:state.groups[0].id)}</select></div>
        <button class="btn btn-primary" onclick="addOne()">追加する</button>
      </div>
      <p class="help">教科書のUnitに合わせて登録するなら、グループで「Unit 1」などを選んでね。</p>`;
  }else if(mngTab==='bulk'){
    body.innerHTML=`
      <div class="add-box">
        <div class="field"><label>グループ</label><select id="bulkGrp">${grpOptions(currentGroup!=='all'?currentGroup:'u1')}</select></div>
        <div class="field"><label>単語リスト（1行に1つ）</label>
          <textarea id="bulkText" placeholder="apple りんご&#10;dog 犬&#10;run 走る&#10;&#10;※ 英語と日本語の間は スペース か カンマ で区切る"></textarea></div>
        <button class="btn btn-primary" onclick="addBulk()">まとめて追加</button>
      </div>
      <p class="help">NEW HORIZON の教科書を見ながら「英語 日本語」を改行で並べて貼り付ければ、一気に登録できるよ。区切りはスペースでもカンマ(,)でもOK。</p>`;
  }else if(mngTab==='grp'){
    body.innerHTML=`
      <div class="add-box">
        <div class="field"><label>新しいグループ名</label><input id="grpName" placeholder="例：Unit 9 / 不規則動詞"></div>
        <button class="btn btn-primary" onclick="addGroup()">グループを作る</button>
      </div>
      <p class="help" style="margin-bottom:10px">✏️ で名前を変えられる（例：「Unit 1」→「Unit 1 Hello, everyone」）。🗑 で削除。</p>
      <div class="word-list">
        ${state.groups.map(g=>`<div class="word-row">
          <div><div class="w-ja" style="font-size:14px">${esc(g.name)}</div><div class="w-grp">${wordsOf(g.id).length}語</div></div>
          <div class="ops">
            <button class="iconbtn" onclick="renameGroup('${g.id}')">✏️</button>
            <button class="iconbtn del" onclick="delGroup('${g.id}')">🗑</button>
          </div></div>`).join('')}
      </div>`;
  }else{
    const list=wordsOf(currentGroup);
    if(!list.length){ body.innerHTML=`<div class="empty">「${esc(groupName(currentGroup))}」にはまだ単語がないよ。<br>「1語ずつ」か「まとめて」から追加しよう。</div>`; return; }
    body.innerHTML=`
      <p class="help" style="margin-bottom:10px">表示中：<b style="color:var(--primary)">${esc(groupName(currentGroup))}</b>（${list.length}語）ホームでグループを切りかえられるよ。</p>
      <div class="word-list">
        ${list.map(x=>`<div class="word-row">
          <div><span class="w-en">${esc(x.en)}</span> <span class="w-ja">${esc(x.ja)}</span><div class="w-grp">${esc(groupName(x.groupId))}${x.learned?' ・✓おぼえた':''}</div></div>
          <div class="ops"><button class="iconbtn del" onclick="delWord('${x.id}')">🗑</button></div>
        </div>`).join('')}
      </div>`;
  }
}
function addOne(){
  const en=$('addEn').value.trim(),ja=$('addJa').value.trim(),g=$('addGrp').value;
  if(!en||!ja){toast('英語と日本語の両方を入れてね');return;}
  state.words.push(w(en,ja,g)); save(); toast('追加したよ ✓');
  $('addEn').value='';$('addJa').value='';$('addEn').focus();
}
function addBulk(){
  const g=$('bulkGrp').value;
  const lines=$('bulkText').value.split('\n').map(l=>l.trim()).filter(Boolean);
  let n=0;
  lines.forEach(l=>{
    const parts=l.includes(',')?l.split(','):l.split(/\s+/);
    if(parts.length>=2){const en=parts[0].trim(),ja=parts.slice(1).join(' ').trim();if(en&&ja){state.words.push(w(en,ja,g));n++;}}
  });
  save(); toast(n?`${n}語 追加したよ 🎉`:'うまく読めなかったみたい');
  if(n){mngTab='list';currentGroup=g;renderManage();}
}
function addGroup(){
  const name=$('grpName').value.trim();
  if(!name){toast('グループ名を入れてね');return;}
  state.groups.push({id:'g_'+Math.random().toString(36).slice(2,8),name}); save(); toast('グループを作ったよ ✓'); renderManage();
}
function renameGroup(id){
  const g=state.groups.find(x=>x.id===id); if(!g)return;
  const name=prompt('グループ名を変更',g.name);
  if(name&&name.trim()){g.name=name.trim();save();renderManage();}
}
function delGroup(id){
  const cnt=wordsOf(id).length;
  if(!confirm(`「${groupName(id)}」を消す？\n中の${cnt}語も一緒に消えるよ。`))return;
  state.groups=state.groups.filter(g=>g.id!==id);
  state.words=state.words.filter(x=>x.groupId!==id);
  if(currentGroup===id)currentGroup='all';
  save(); renderManage();
}
function delWord(id){ state.words=state.words.filter(x=>x.id!==id); save(); renderMngBody(); }

renderHome();
</script>
</body>
</html>
